version: '3.8'

services:
  backend:
    image: save-vision-violation:backend
    container_name: warehouse-backend
    ports:
      - "8000:8000"
    environment:
      - MODEL_API_URL=http://10.190.28.23:31674/predict
      - MODEL_API_TIMEOUT=30
      - MODEL_API_IMGSZ=640
      - MODEL_API_CONFIDENCE=0.2
      - REDIS_HOST=${REDIS_HOST:-}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-}
    volumes:
      # 配置文件挂载（修改后重启容器生效）
      - ./config/config.yml:/app/config.yml
      # 数据持久化目录
      - ./data:/app/data
      # 日志持久化目录
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - warehouse-net

  frontend:
    image: save-vision-violation:frontend
    container_name: warehouse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - warehouse-net

networks:
  warehouse-net:
    driver: bridge
